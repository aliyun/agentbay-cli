# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog\n\nAll notable changes to this project will be documented in this file.\
\nThe format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),\
\nand this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}

### English
{% set breaking_commits = commits | filter(attribute="breaking", value=true) %}\
{% if breaking_commits | length > 0 %}
#### ⚠️ Breaking Changes
{% for commit in breaking_commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.github.pr_number %} ([#{{ commit.github.pr_number }}](https://github.com/aliyun/agentbay-cli/pull/{{ commit.github.pr_number }})){% else %} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/aliyun/agentbay-cli/commit/{{ commit.id }})){% endif %}\
{% if commit.github.username %} by @{{ commit.github.username }}{% endif %}\
{% endfor %}
{% endif %}\
{% for group, group_commits in commits | filter(attribute="breaking", value=false) | group_by(attribute="group") %}
#### {{ group | striptags | trim | upper_first }}
{% for commit in group_commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.github.pr_number %} ([#{{ commit.github.pr_number }}](https://github.com/aliyun/agentbay-cli/pull/{{ commit.github.pr_number }})){% else %} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/aliyun/agentbay-cli/commit/{{ commit.id }})){% endif %}\
{% if commit.github.username %} by @{{ commit.github.username }}{% endif %}\
{% endfor %}
{% endfor %}

### 中文

<!-- TRANSLATE_ME: 在 Claude Code 里说「翻译 CHANGELOG.md 顶部 [{% if version %}{{ version | trim_start_matches(pat="v") }}{% else %}Unreleased{% endif %}] 那段的 English 子段为中文，写到此 ### 中文 段下，并删除本 TRANSLATE_ME 注释」 -->

---
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  # Skip merge commits
  { message = "^Merge (pull request|branch|remote-tracking)", skip = true },
  { message = "^Merge branch", skip = true },
  { message = "^Merge remote-tracking", skip = true },
  # Skip auto-generated Homebrew formula commits
  { message = "^feat: add official Homebrew formula", skip = true },
  # Skip internal tooling commits
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
  { message = "^style", skip = true },
  { message = "^test", skip = true },
  # Skip trivial update commits
  { message = "^update (readme|cmd|client|user guide|integration test|brew yml|gitignore|errorinfo)", skip = true },
  { message = "^delete useless", skip = true },
  { message = "^remove (useless|fixossendpoint|mock api)", skip = true },
  { message = "^add test (unit|integration)$", skip = true },
  { message = "^add (ak/sk|refresh test)", skip = true },
  { message = "^useful port", skip = true },
  { message = "^add (unit test|test file)$", skip = true },
  { message = "^(Initial commit|V0\\.1\\.0)", skip = true },
  { message = "^Revert PR", skip = true },
  # Classify conventional commits
  { message = "^feat(\\((.+)\\))?!?:", group = "<!-- 0 -->🚀 Features" },
  { message = "^feat!:", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix(\\((.+)\\))?!?:", group = "<!-- 1 -->🐞 Bug Fixes" },
  { message = "^fix!:", group = "<!-- 1 -->🐞 Bug Fixes" },
  { message = "^docs(\\((.+)\\))?:", group = "<!-- 2 -->📖 Documentation" },
  { message = "^refactor(\\((.+)\\))?:", group = "<!-- 3 -->🛠 Refactoring" },
  { message = "^perf(\\((.+)\\))?:", group = "<!-- 4 -->⚡️ Performance" },
  { body = ".*security", group = "<!-- 5 -->🔒 Security" },
  # Classify non-conventional commits that look like features
  { message = "^add ", group = "<!-- 0 -->🚀 Features" },
  { message = "^support ", group = "<!-- 0 -->🚀 Features" },
  # Everything else
  { message = "^.*", group = "<!-- 9 -->📦 Other Changes" },
]
filter_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "oldest"

# Scope normalization: map variant scope names to canonical CLI command groups
scope_parsers = [
  { pattern = "api-key|apikey", scope = "apikey" },
  { pattern = "img|image", scope = "image" },
  { pattern = "net|network", scope = "network" },
  { pattern = "skill|skills", scope = "skills" },
  { pattern = "docker", scope = "docker" },
  { pattern = "core|auth|login|logout", scope = "core" },
  { pattern = "client|sdk", scope = "client" },
]

[remote]
owner = "aliyun"
repo = "agentbay-cli"